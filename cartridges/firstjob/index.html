<!DOCTYPE html>
<html lang="es">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
 <link rel="stylesheet" href="/tailwind.css">
 <title>First Job: Workstation</title>
 <style>
 :root {
 --bezel: #1e293b;
 --screen-bg: #050a14;
 --led-on: #ef4444;
 --led-off: #450a0a;
 --cyan: #22d3ee;
 --slate-900: #0f172a;
 }
 html {
 height: 100%;
 -webkit-text-size-adjust: 100%;
 }
 body {
 background-color: #020617;
 background-image:
 radial-gradient(ellipse 80% 60% at 50% 20%, rgba(34, 211, 238, 0.08) 0%, transparent 55%),
 radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 80%),
 linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
 linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
 background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
 font-family: system-ui, sans-serif;
 overflow: hidden;
 touch-action: none;
 display: flex;
 align-items: center;
 justify-content: center;
 min-height: 100vh;
 min-height: 100dvh;
 min-height: 100svh;
 color: white;
 user-select: none;
 -webkit-user-select: none;
 margin: 0;
 }

 
 .hidden { display: none !important; }

 
 .console-shell {
 background: linear-gradient(180deg, #1e293b 0%, #0f172a 40%, #0f172a 100%);
 border-top: 2px solid #475569;
 border-bottom: 8px solid #020617;
 border-radius: 30px;
 box-shadow:
 0 0 0 4px #1e293b,
 0 0 40px rgba(34, 211, 238, 0.08),
 0 20px 50px rgba(0,0,0,0.9);
 
 padding: 2.75rem 20px 20px 20px;
 
 
 width: min(98vw, 100%);
 height: min(95vh, 95dvh);
 max-width: none;
 max-height: none;

 display: flex;
 flex-direction: row;
 align-items: center;
 justify-content: space-between;
 gap: 2rem;
 position: relative;
 box-sizing: border-box;
 }

 
 .screen-container {
 flex-grow: 1;
 height: 100%;
 background: #000;
 border-radius: 12px;
 padding: 15px;
 border: 4px solid #334155;
 box-shadow: inset 0 0 30px rgba(0,0,0,1), 0 0 24px rgba(34, 211, 238, 0.06);
 position: relative;
 display: flex;
 align-items: center;
 justify-content: center;
 overflow: hidden;
 box-sizing: border-box;
 }

 
 .crt-overlay {
 position: absolute; inset: 0; pointer-events: none; z-index: 10;
 background: 
 linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
 linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
 background-size: 100% 3px, 3px 100%;
 border-radius: 8px;
 }
 
 canvas {
 image-rendering: pixelated;
 width: 100%;
 height: 100%;
 object-fit: contain; 
 border-radius: 4px;
 box-shadow: 0 0 20px rgba(14, 165, 233, 0.1);
 }

 
 #btn-pause {
 position: absolute; top: 1rem; right: 1rem; z-index: 40;
 color: #155e75; background: none; border: none; font-family: monospace;
 font-size: 1.5rem; font-weight: bold; cursor: pointer;
 }
 #btn-pause:hover { color: #22d3ee; }

 
 #task-input-layer {
 position: absolute;
 inset: 0;
 background: rgba(0,0,0,0.85);
 z-index: 20;
 display: none;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 padding: 2rem;
 backdrop-filter: blur(2px);
 }

 
 #task-input-layer.interview-mode {
 background: rgba(0,0,0,0) !important;
 justify-content: flex-end; 
 padding-bottom: 20px;
 }
 
 #task-input-layer.interview-mode .terminal-window {
 margin-bottom: 20px;
 background: rgba(15, 23, 42, 0.8); 
 border: none;
 box-shadow: none;
 }
 
 #task-input-layer.interview-mode .term-header {
 background: transparent;
 color: #22d3ee;
 border-bottom: 1px solid #22d3ee;
 text-shadow: 0 2px 4px rgba(0,0,0,0.8);
 }
 
 #task-input-layer.interview-mode #task-prompt-text {
 color: #fff;
 text-shadow: 0 2px 4px #000;
 font-size: 1.2rem; 
 background: rgba(0,0,0,0.6);
 padding: 10px;
 border-radius: 4px;
 }

 .terminal-window {
 width: 100%;
 max-width: 500px;
 background: #0f172a;
 border: 2px solid #22d3ee;
 box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
 padding: 2px;
 }
 
 .term-header {
 background: #22d3ee;
 color: #000;
 font-family: monospace;
 padding: 4px 8px;
 font-size: 1.2rem;
 font-weight: bold;
 }

 .term-body {
 padding: 20px;
 font-family: monospace;
 }

 #task-prompt-text {
 color: #cbd5e1;
 font-size: 1.5rem;
 margin-bottom: 20px;
 line-height: 1.2;
 }

 #task-answer-input {
 width: 100%;
 background: #000;
 border: none;
 border-bottom: 2px solid #22d3ee;
 color: #22d3ee;
 font-family: monospace;
 font-size: 2rem;
 padding: 10px;
 outline: none;
 text-transform: uppercase;
 box-sizing: border-box;
 }

 #task-answer-input:disabled {
 color: #555;
 border-bottom-color: #555;
 }

 #btn-submit-task {
 margin-top: 20px;
 width: 100%;
 background: #1e293b;
 color: #22d3ee;
 border: 1px solid #22d3ee;
 padding: 10px;
 font-family: system-ui, sans-serif;
 font-weight: bold;
 cursor: pointer;
 transition: all 0.2s;
 }
 #btn-submit-task:hover {
 background: #22d3ee;
 color: #000;
 }
 #btn-submit-task:disabled {
 background: #0f172a;
 color: #555;
 border-color: #555;
 cursor: wait;
 }

 
 .controls-area {
 display: flex;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 width: 160px; 
 gap: 2rem;
 transition: transform 0.3s ease;
 }
 
 .control-desc { font-size: 0.75rem; color: #64748b; margin-top: 1rem; text-align: center; font-family: monospace; }
 @media(max-width: 768px) { .control-desc { display: none; } }

 
 @media (min-width: 1280px) {
 .controls-area { transform: scale(1.3); width: 200px; }
 }
 @media (min-width: 2000px) {
 .controls-area { transform: scale(1.8); width: 260px; }
 }

 
 .d-pad-grid {
 display: grid;
 grid-template-columns: repeat(3, 40px);
 grid-template-rows: repeat(3, 40px);
 gap: 4px;
 }
 .d-btn {
 background: #334155;
 color: #e2e8f0;
 border: none;
 border-radius: 8px;
 box-shadow: 0 4px 0 #0f172a;
 cursor: pointer;
 transition: all 0.1s;
 }
 .d-btn:active, .d-btn.active {
 transform: translateY(4px);
 box-shadow: 0 0 0 #0f172a;
 background: #475569;
 }
 .d-center { background: #1e293b; grid-column: 2; grid-row: 2; border-radius: 4px; pointer-events: none; }
 
 #btn-up { grid-column: 2; grid-row: 1; border-radius: 8px 8px 4px 4px; }
 #btn-down { grid-column: 2; grid-row: 3; border-radius: 4px 4px 8px 8px; }
 #btn-left { grid-column: 1; grid-row: 2; border-radius: 8px 4px 4px 8px; }
 #btn-right { grid-column: 3; grid-row: 2; border-radius: 4px 8px 8px 4px; }

 
 .action-group {
 display: flex;
 gap: 20px;
 transform: rotate(-10deg);
 }
 .action-col { display: flex; flex-direction: column; align-items: center; }
 .action-label { font-size: 10px; color: #64748b; font-weight: bold; margin-top: 0.5rem; }
 
 .action-btn {
 width: 60px; height: 60px;
 border-radius: 50%;
 font-weight: 900;
 display: flex; align-items: center; justify-content: center;
 font-size: 1.2rem;
 box-shadow: 0 5px 0 rgba(0,0,0,0.5), inset 0 3px 5px rgba(255,255,255,0.2);
 cursor: pointer;
 text-shadow: 0 1px 0 rgba(0,0,0,0.5);
 transition: all 0.1s;
 }
 .action-btn:active, .action-btn.active {
 transform: translateY(5px);
 box-shadow: 0 0 0 rgba(0,0,0,0.5);
 }
 #btn-b { background: #ef4444; color: #7f1d1d; margin-top: 20px; }
 #btn-a { background: #22c55e; color: #14532d; }

 
 @media (max-width: 800px) {
 .console-shell {
 flex-direction: column;
 position: relative;
 padding: max(2.5rem, env(safe-area-inset-top, 0px)) max(10px, env(safe-area-inset-right, 0px))
 max(10px, env(safe-area-inset-bottom, 0px)) max(10px, env(safe-area-inset-left, 0px));
 height: 100vh;
 height: 100dvh;
 width: 100%;
 max-width: 100vw;
 border-radius: 0;
 border: none;
 gap: 8px;
 }
 .screen-container {
 width: 100%;
 flex: 1 1 auto;
 min-height: 0;
 margin-top: 0;
 margin-bottom: 0;
 /* Room for floating thumb controls. */
 padding-bottom: max(7.5rem, calc(env(safe-area-inset-bottom, 0px) + 6.5rem));
 }
 /* Thumb zones float over the screen corners, not stacked above it. */
 .console-shell > .controls-area:first-of-type {
 position: absolute;
 left: max(10px, calc(env(safe-area-inset-left, 0px) + 4px));
 bottom: max(12px, calc(env(safe-area-inset-bottom, 0px) + 8px));
 width: auto;
 flex-direction: column;
 justify-content: flex-end;
 align-items: flex-start;
 padding: 0;
 flex: 0 0 auto;
 transform: none !important;
 z-index: 40;
 gap: 0;
 }
 .console-shell > .controls-area:last-of-type {
 position: absolute;
 right: max(10px, calc(env(safe-area-inset-right, 0px) + 4px));
 bottom: max(12px, calc(env(safe-area-inset-bottom, 0px) + 8px));
 width: auto;
 flex-direction: column;
 justify-content: flex-end;
 align-items: flex-end;
 padding: 0;
 flex: 0 0 auto;
 transform: none !important;
 z-index: 40;
 gap: 0;
 }
 .d-pad-grid {
 transform: none;
 grid-template-columns: repeat(3, minmax(3.05rem, 3.35rem));
 grid-template-rows: repeat(3, minmax(3.05rem, 3.35rem));
 gap: 6px;
 }
 .d-btn {
 min-width: 3.05rem;
 min-height: 3.05rem;
 touch-action: manipulation;
 -webkit-tap-highlight-color: transparent;
 }
 .action-group {
 transform: none;
 gap: 12px;
 align-items: flex-end;
 }
 .action-btn {
 width: 3.5rem;
 height: 3.5rem;
 font-size: 1.1rem;
 touch-action: manipulation;
 -webkit-tap-highlight-color: transparent;
 }
 #btn-b { margin-top: 1rem; }
 .action-label { margin-top: 0.25rem; }
 }
 @media (max-width: 800px) and (orientation: landscape) and (max-height: 520px) {
 .console-shell {
 flex-direction: row;
 flex-wrap: nowrap;
 padding: 6px 8px;
 padding-top: max(1.5rem, env(safe-area-inset-top, 0px));
 padding-bottom: max(8px, env(safe-area-inset-bottom, 0px));
 gap: 8px;
 height: 100dvh;
 max-height: 100dvh;
 }
 .screen-container {
 flex: 1 1 65%;
 min-height: 0;
 margin-top: 0;
 padding: 8px;
 padding-bottom: 8px;
 }
 .console-shell > .controls-area:first-of-type,
 .console-shell > .controls-area:last-of-type {
 position: relative;
 left: auto;
 right: auto;
 bottom: auto;
 flex: 0 0 auto;
 flex-direction: column;
 justify-content: center;
 align-items: center;
 width: auto;
 min-width: 100px;
 gap: 0.5rem;
 padding: 0 4px;
 z-index: 1;
 }
 .d-pad-grid {
 transform: none;
 grid-template-columns: repeat(3, 2.8rem);
 grid-template-rows: repeat(3, 2.8rem);
 gap: 5px;
 }
 .action-btn {
 width: 2.85rem;
 height: 2.85rem;
 font-size: 0.95rem;
 }
 .action-group {
 transform: none;
 gap: 10px;
 }
 #btn-b { margin-top: 0.55rem; }
 }

 
 .brand-stripe {
 position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
 font-size: 0.7rem; letter-spacing: 0.2rem; color: #475569; font-weight: bold;
 text-shadow: 0 1px 0 rgba(255,255,255,0.1);
 text-transform: uppercase;
 z-index: 50;
 }
 
 
 #start-screen {
 position: absolute;
 inset: 0;
 z-index: 50;
 display: flex;
 flex-direction: column;
 align-items: center;
 justify-content: center;
 background: radial-gradient(ellipse at 50% 30%, #1e293b 0%, #0f172a 45%, #020617 100%);
 color: #22d3ee;
 padding: max(1.5rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right))
 max(1.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
 box-sizing: border-box;
 overflow: hidden;
 }
 #start-screen::before {
 content: '';
 position: absolute;
 inset: 0;
 background: linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px);
 background-size: 100% 4px;
 pointer-events: none;
 animation: scan 8s linear infinite;
 }
 @keyframes scan { from { background-position: 0 0; } to { background-position: 0 100px; } }
 @keyframes pulse-glow {
 0%, 100% { box-shadow: 0 0 20px rgba(8,145,178,0.45); }
 50% { box-shadow: 0 0 32px rgba(34,211,238,0.65); }
 }
 #start-screen h1 {
 font-size: 2.25rem; font-weight: 700; margin-bottom: 1rem; font-family: monospace; letter-spacing: -0.05em;
 border-bottom: 4px solid #06b6d4; padding-bottom: 0.5rem;
 text-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
 position: relative; z-index: 1;
 }
 @media(min-width: 768px) { #start-screen h1 { font-size: 3.75rem; } }
 
 #start-desc {
 font-size: 0.875rem; margin-bottom: 2rem; text-align: center; max-width: 28rem; font-family: monospace; opacity: 0.8; line-height: 1.625;
 }
 @media(min-width: 768px) { #start-desc { font-size: 1rem; } }
 
 #btn-start {
 padding: 1rem 2rem; background: #0891b2; color: white; font-weight: 700; font-family: monospace; font-size: 1.25rem; letter-spacing: 0.1em;
 box-shadow: 0 0 20px rgba(8,145,178,0.5); transition: all 0.2s; text-transform: uppercase; border: none; cursor: pointer;
 animation: pulse-glow 2.5s ease-in-out infinite;
 position: relative; z-index: 1;
 }
 #btn-start:hover { background: #06b6d4; }
 #btn-start:active { transform: scale(0.95); }

 #start-tagline {
 font-size: 0.7rem; letter-spacing: 0.35em; color: #64748b;
 margin-bottom: 0.5rem; font-family: monospace; text-transform: uppercase;
 }
 #start-badge {
 display: inline-block; font-size: 0.65rem; letter-spacing: 0.15em;
 background: rgba(34, 211, 238, 0.15); color: #22d3ee;
 border: 1px solid rgba(34, 211, 238, 0.4); padding: 4px 10px;
 margin-bottom: 1.5rem; font-family: monospace;
 }

 
 #choice-layer {
 position: absolute;
 inset: 0;
 z-index: 25;
 display: none;
 flex-direction: column;
 justify-content: flex-end;
 padding: 0;
 background: transparent;
 box-sizing: border-box;
 pointer-events: none;
 }
 #choice-layer.active {
 display: flex;
 pointer-events: auto;
 }
 .choice-spacer {
 flex: 1 1 auto;
 min-height: 22%;
 pointer-events: none;
 }
 #choice-layer.interview-choices,
 #choice-layer.task-choices {
 justify-content: flex-end;
 background: linear-gradient(
 to bottom,
 transparent 0%,
 transparent 28%,
 rgba(2, 6, 23, 0.88) 38%,
 rgba(2, 6, 23, 0.98) 52%,
 rgba(2, 6, 23, 1) 100%
);
 }

 #choice-question-box {
 display: none;
 margin: 0 10px 10px;
 padding: 12px 14px;
 background: #0f172a;
 border: 2px solid #22d3ee;
 border-radius: 6px;
 box-shadow:
 0 0 20px rgba(34, 211, 238, 0.25),
 inset 0 1px 0 rgba(255, 255, 255, 0.06);
 flex-shrink: 0;
 }
 #choice-layer.interview-choices #choice-question-box,
 #choice-layer.task-choices #choice-question-box {
 display: block;
 }
 #choice-layer.task-choices #choice-question-box {
 border-color: #f87171;
 box-shadow: 0 0 16px rgba(248, 113, 113, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
 }

 #choice-question-label {
 font-family: monospace;
 font-size: clamp(0.6rem, 2vw, 0.7rem);
 font-weight: bold;
 color: #22d3ee;
 text-transform: uppercase;
 letter-spacing: 0.12em;
 margin-bottom: 6px;
 }
 #choice-layer.task-choices #choice-question-label {
 color: #fca5a5;
 }

 #choice-question-text {
 font-family: system-ui, -apple-system, sans-serif;
 font-size: clamp(0.95rem, 3.2vw, 1.2rem);
 font-weight: 700;
 color: #ffffff;
 line-height: 1.45;
 text-shadow: 0 1px 2px rgba(0, 0, 0, 0.8);
 word-break: break-word;
 }

 #choice-topic {
 display: none;
 margin-top: 8px;
 font-family: monospace;
 font-size: clamp(0.6rem, 1.8vw, 0.7rem);
 color: #94a3b8;
 letter-spacing: 0.04em;
 }
 #choice-topic.visible { display: block; }

 #choice-panel {
 padding: 0 10px 10px;
 pointer-events: auto;
 }

 #choice-prompt {
 font-family: monospace;
 font-size: clamp(0.65rem, 2vw, 0.75rem);
 color: #64748b;
 margin-bottom: 6px;
 text-transform: uppercase;
 letter-spacing: 0.1em;
 }
 #choice-options {
 display: flex;
 flex-direction: column;
 gap: 5px;
 max-height: min(36dvh, 168px);
 overflow-y: auto;
 -webkit-overflow-scrolling: touch;
 }
 .choice-btn {
 width: 100%;
 font-family: monospace;
 font-weight: bold;
 font-size: clamp(0.8rem, 2.2vw, 1rem);
 padding: 10px 12px 10px 36px;
 border: 2px solid #334155;
 background: rgba(15, 23, 42, 0.9);
 color: #e2e8f0;
 cursor: pointer;
 text-align: left;
 line-height: 1.3;
 box-sizing: border-box;
 transition: all 0.12s;
 position: relative;
 border-radius: 4px;
 }
 .choice-btn::before {
 content: attr(data-key);
 position: absolute;
 left: 10px;
 top: 50%;
 transform: translateY(-50%);
 font-size: 0.75rem;
 color: #64748b;
 font-weight: normal;
 }
 .choice-btn.selected {
 border-color: #22d3ee;
 background: rgba(34, 211, 238, 0.12);
 color: #22d3ee;
 box-shadow: 0 0 12px rgba(34, 211, 238, 0.25);
 }
 .choice-btn.selected::before { color: #22d3ee; }
 .choice-btn:active, .choice-btn.pressed {
 transform: scale(0.98);
 background: #22d3ee;
 color: #0f172a;
 border-color: #22d3ee;
 }
 #choice-hint {
 font-family: monospace;
 font-size: clamp(0.55rem, 1.6vw, 0.65rem);
 color: #475569;
 text-align: center;
 margin-top: 6px;
 letter-spacing: 0.05em;
 }

 </style>
</head>
<body>

 <div id="start-screen">
 <p id="start-tagline">ARBORITO ARCADE SERIES</p>
 <h1>FIRST JOB</h1>
 <span id="start-badge">CORP SIM v5.0</span>
 <p id="start-desc"></p>
 <button id="btn-start"></button>
 </div>

 <div class="console-shell">
 <div class="brand-stripe">ARBORITO ARCADE SERIES</div>

 <div class="controls-area" style="justify-content: center;">
 <div class="d-pad-grid">
 <div id="btn-up" class="d-btn"></div>
 <div id="btn-left" class="d-btn"></div>
 <div class="d-center"></div>
 <div id="btn-right" class="d-btn"></div>
 <div id="btn-down" class="d-btn"></div>
 </div>
 <div id="controls-dpad-desc" class="control-desc"></div>
 </div>

 <div class="screen-container">
 <button id="btn-pause">II</button>

 <div class="crt-overlay"></div>
 
 <canvas id="game-canvas" width="320" height="240"></canvas>

 <div id="task-input-layer">
 <div class="terminal-window">
 <div id="term-header" class="term-header">TICKET_RESOLVER_v1.0</div>
 <div class="term-body">
 <div id="task-prompt-text">ERROR: PRINTER JAMMED</div>
 <input type="text" id="task-answer-input" placeholder="TYPE SOLUTION..." autocomplete="off">
 <button id="btn-submit-task">EXECUTE</button>
 </div>
 </div>
 </div>

 <div id="choice-layer">
 <div class="choice-spacer" aria-hidden="true"></div>
 <div id="choice-question-box">
 <div id="choice-question-label">PREGUNTA</div>
 <div id="choice-question-text"></div>
 <div id="choice-topic"></div>
 </div>
 <div id="choice-panel">
 <div id="choice-prompt">SELECT RESPONSE</div>
 <div id="choice-options"></div>
 <div id="choice-hint">↑↓ NAVIGATE · [A] CONFIRM</div>
 </div>
 </div>
 </div>

 <div class="controls-area" style="justify-content: center;">
 <div class="action-group">
 <div class="action-col">
 <div id="btn-b" class="action-btn">B</div>
 <div id="action-b-label" class="action-label">BACK</div>
 </div>
 <div class="action-col">
 <div id="btn-a" class="action-btn">A</div>
 <div id="action-a-label" class="action-label">ACT</div>
 </div>
 </div>
 <div id="controls-action-desc" class="control-desc"></div>
 </div>
 </div>

 <script type="module" src="./game.js"></script>
</body>
</html>
