<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="stylesheet" href="/tailwind.css">
<title>Wrong Fruit</title>
<style>
  :root {
    --soil: #1a1208;
    --leaf: #34d399;
    --gold: #fbbf24;
    --danger: #f43f5e;
    --sky: #0c1929;
  }
  html, body { height: 100%; margin: 0; overflow: hidden; }
  body {
    font-family: "Segoe UI", system-ui, sans-serif;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(52,211,153,.18), transparent),
      radial-gradient(ellipse 60% 40% at 80% 100%, rgba(251,191,36,.08), transparent),
      linear-gradient(180deg, #071018 0%, #0c1929 40%, #13261a 100%);
    color: #ecfdf5;
    user-select: none;
    touch-action: none;
  }
  .hidden { display: none !important; }
  #app {
    display: flex; flex-direction: column; height: 100dvh;
    padding: max(.35rem, env(safe-area-inset-top)) max(.5rem, env(safe-area-inset-right))
             max(.45rem, env(safe-area-inset-bottom)) max(.5rem, env(safe-area-inset-left));
    gap: .35rem;
  }
  #game-wrap {
    flex: 1 1 auto; min-height: 0; display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .dpad {
    display: none;
    /* Left-thumb zone: comfortable reach above the home indicator. */
    position: relative;
    grid-template-columns: repeat(3, minmax(3.25rem, 3.6rem));
    grid-template-rows: repeat(3, minmax(3.25rem, 3.6rem));
    gap: .35rem;
    justify-content: start;
    align-self: flex-start;
    margin: .15rem auto 0 max(0.35rem, env(safe-area-inset-left, 0px));
    flex-shrink: 0;
    padding-bottom: max(0.35rem, env(safe-area-inset-bottom, 0px));
  }
  @media (pointer: coarse) {
    .dpad { display: grid; }
  }
  @media (pointer: coarse) and (orientation: landscape) and (max-height: 480px) {
    .dpad {
      position: fixed;
      z-index: 20;
      left: max(10px, env(safe-area-inset-left, 0px));
      bottom: max(10px, env(safe-area-inset-bottom, 0px));
      margin: 0;
      grid-template-columns: repeat(3, 3rem);
      grid-template-rows: repeat(3, 3rem);
      gap: .28rem;
      padding-bottom: 0;
      background: rgba(4, 12, 18, 0.35);
      border-radius: .65rem;
      padding: .35rem;
    }
  }
  .dpad button {
    border: none; border-radius: .65rem;
    min-width: 3.25rem; min-height: 3.25rem;
    background: linear-gradient(160deg, rgba(16,185,129,.35), rgba(6,78,59,.5));
    color: #ecfdf5; font-size: 1.25rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.15);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .dpad button:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  .dpad .blank { background: transparent; pointer-events: none; box-shadow: none; min-width: 0; min-height: 0; }
  header {
    display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
  }
  .brand { display: flex; flex-direction: column; gap: .05rem; }
  .brand h1 {
    margin: 0; font-size: clamp(1.05rem, 3.5vw, 1.35rem); font-weight: 900;
    letter-spacing: .02em;
    background: linear-gradient(90deg, #86efac, #fbbf24, #86efac);
    background-size: 200% auto;
    -webkit-background-clip: text; background-clip: text; color: transparent;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { to { background-position: 200% center; } }
  .sub {
    font-size: .55rem; color: #6ee7b7; font-family: ui-monospace, monospace;
    text-transform: uppercase; letter-spacing: .12em; opacity: .85;
  }
  .hud { display: flex; gap: .35rem; flex-wrap: wrap; justify-content: flex-end; }
  .chip {
    padding: .2rem .5rem; border-radius: 999px; font-size: .62rem; font-weight: 800;
    background: rgba(0,0,0,.45); border: 1px solid rgba(134,239,172,.28);
    backdrop-filter: blur(6px); box-shadow: 0 0 12px rgba(52,211,153,.12);
  }
  .chip.stage { border-color: rgba(251,191,36,.45); color: #fde68a; }
  .chip.lives { border-color: rgba(244,63,94,.4); color: #fda4af; }
  #question-bar {
    flex-shrink: 0;
    background: linear-gradient(135deg, rgba(6,78,59,.55), rgba(12,40,28,.7));
    border: 1px solid rgba(52,211,153,.4);
    border-radius: .7rem; padding: .4rem .65rem;
    font-size: clamp(.78rem, 2.6vw, .95rem); font-weight: 700; line-height: 1.35;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 8px 24px -16px rgba(16,185,129,.5);
    transition: box-shadow .2s ease, border-color .2s ease, transform .2s ease;
  }
  #question-bar.q-glow {
    animation: qGlow 1.35s ease;
  }
  @keyframes qGlow {
    0% { transform: scale(1); border-color: rgba(251,191,36,.95); box-shadow: 0 0 0 0 rgba(251,191,36,.0); }
    35% { transform: scale(1.015); border-color: #fde68a; box-shadow: 0 0 28px rgba(251,191,36,.75), inset 0 0 18px rgba(253,224,71,.25); }
    100% { transform: scale(1); border-color: rgba(52,211,153,.4); box-shadow: inset 0 1px 0 rgba(255,255,255,.06), 0 8px 24px -16px rgba(16,185,129,.5); }
  }
  #question-bar .hint {
    display: block; margin-top: .15rem; font-size: .62rem; font-weight: 600;
    color: #6ee7b7; letter-spacing: .03em; text-transform: none; opacity: .95;
  }
  #game-wrap.slow-mo #canvas {
    filter: saturate(1.15) brightness(1.04);
    box-shadow:
      0 0 0 2px rgba(251,191,36,.45),
      0 12px 40px -10px rgba(251,191,36,.35),
      inset 0 0 60px rgba(0,0,0,.35);
  }
  #canvas {
    border-radius: .75rem;
    border: 2px solid rgba(52,211,153,.4);
    box-shadow:
      0 0 0 1px rgba(251,191,36,.15),
      0 12px 40px -10px rgba(16,185,129,.55),
      inset 0 0 60px rgba(0,0,0,.35);
    touch-action: none; max-width: 100%; max-height: 100%;
    background: #1a1208;
  }
  #stage-banner {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 5; opacity: 0; transition: opacity .28s ease;
    padding: 1rem; background: rgba(4,12,18,.55);
  }
  #stage-banner.show { opacity: 1; }
  #stage-banner span {
    max-width: min(92%, 28rem);
    font-size: clamp(1.15rem, 5.2vw, 1.85rem); font-weight: 900;
    line-height: 1.25; text-align: center;
    color: #fde68a; text-shadow: 0 0 24px rgba(251,191,36,.8), 0 4px 12px #000;
    letter-spacing: .02em;
  }
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(4,12,18,.92); backdrop-filter: blur(10px); padding: 1rem; text-align: center;
  }
  .card {
    max-width: 23rem; width: 100%; padding: 1.5rem 1.35rem; border-radius: 1.15rem;
    background:
      radial-gradient(ellipse at 30% 0%, rgba(52,211,153,.2), transparent 55%),
      linear-gradient(165deg, #0f2a1c 0%, #071018 100%);
    border: 1px solid rgba(52,211,153,.35);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,.8), 0 0 40px rgba(52,211,153,.12);
  }
  .card .hero { font-size: 3.2rem; filter: drop-shadow(0 8px 16px rgba(0,0,0,.5)); margin-bottom: .2rem; }
  .card h2 {
    margin: 0 0 .4rem; font-size: 1.65rem; font-weight: 900;
    background: linear-gradient(90deg, #86efac, #fbbf24);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .card p { color: #a7f3d0; font-size: .8rem; line-height: 1.5; margin: 0 0 1.1rem; }
  .btn {
    padding: .85rem 1.4rem; border: none; border-radius: .7rem; font-weight: 800;
    font-size: .95rem; cursor: pointer; width: 100%; font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #059669, #10b981 50%, #34d399);
    color: #042f1e; box-shadow: 0 6px 0 #047857, 0 10px 24px rgba(16,185,129,.35);
  }
  .btn-primary:active { transform: translateY(3px); box-shadow: 0 3px 0 #047857; }
  .btn-ghost {
    background: transparent; border: 1px solid rgba(134,239,172,.4); color: #a7f3d0; margin-top: .45rem;
  }
  .btn.hidden { display: none !important; }
  .stars { letter-spacing: .15em; color: #fbbf24; font-size: 1.1rem; margin-bottom: .5rem; }
</style>
</head>
<body>
<div id="app" class="hidden">
  <header>
    <div class="brand">
      <h1 id="brand-title">WRONG FRUIT</h1>
      <p id="lesson-topic" class="sub">…</p>
    </div>
    <div class="hud">
      <span id="stage-chip" class="chip stage">STAGE 1/50</span>
      <span id="score-chip" class="chip">🍃 0</span>
      <span id="lives-chip" class="chip lives">❤️ 3</span>
    </div>
  </header>
  <div id="question-bar">
    <span id="q-text">…</span>
    <span class="hint" id="q-hint">…</span>
  </div>
  <div id="game-wrap">
    <canvas id="canvas"></canvas>
    <div id="stage-banner"><span>STAGE 1</span></div>
  </div>
  <div class="dpad" id="dpad">
    <span class="blank"></span><button type="button" data-dir="up">▲</button><span class="blank"></span>
    <button type="button" data-dir="left">◀</button><span class="blank"></span><button type="button" data-dir="right">▶</button>
    <span class="blank"></span><button type="button" data-dir="down">▼</button><span class="blank"></span>
  </div>
</div>

<div id="start-screen" class="overlay">
  <div class="card">
    <div class="hero">🐛</div>
    <h2 id="start-title">Wrong Fruit</h2>
    <p id="start-desc">…</p>
    <button id="btn-start" class="btn btn-primary">Enter the garden</button>
  </div>
</div>

<div id="end-screen" class="overlay hidden">
  <div class="card">
    <div class="stars" id="end-stars">★★★</div>
    <h2 id="end-title">…</h2>
    <p id="end-msg">…</p>
    <button id="btn-next" class="btn btn-primary">Next lesson</button>
    <button id="btn-retry" class="btn btn-ghost">Retry garden</button>
  </div>
</div>

<script type="module" src="./game.js"></script>
</body>
</html>
